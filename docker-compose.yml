version: '3.8'

services:
  nginx:
    image: nginx
    container_name: gateway-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx-config/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx-config/routes/dsp_routes.conf:/etc/nginx/routes/dsp_routes.conf:ro
      - ./nginx-config/routes/portfolio_routes.conf:/etc/nginx/routes/portfolio_routes.conf:ro
      - ./nginx-config/routes/dance_academy_routes.conf:/etc/nginx/routes/dance_academy_routes.conf:ro
      - ./nginx-config/proxy_params:/etc/nginx/proxy_params:ro
      - ./nginx-config/cors_proxy.conf:/etc/nginx/cors_proxy.conf:ro
      - ./.htpasswd:/etc/nginx/.htpasswd
      - /home/mendez/dance_academy/dist/browser:/usr/share/nginx/html

    restart: unless-stopped
    networks:
      - shared-network
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  dance_academy_dist:
  
networks:
  shared-network:
    external: true
