# API Routes - Proxy to backend service
location /api/ {
    # Proxy headers MUST be before proxy_pass
    proxy_set_header Host $proxy_host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $server_name;
    
    # Pass to backend - WITHOUT trailing / to preserve path structure
    proxy_pass http://host.docker.internal:5000;
    
    # Enable request body for POST requests
    proxy_request_buffering off;
    
    # CORS headers
    add_header 'Access-Control-Allow-Origin' $cors_origin always;
    add_header 'Access-Control-Allow-Credentials' 'true' always;
    add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, PATCH, OPTIONS' always;
    add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, X-API-KEY' always;
    
    # Handle CORS preflight requests
    if ($request_method = 'OPTIONS') {
        add_header 'Content-Length' 0;
        add_header 'Content-Type' text/plain;
        return 204;
    }
}

# Static files and Angular routing
location / {
    auth_basic "Restricted Access";
    auth_basic_user_file /etc/nginx/.htpasswd;

    # Serve static Angular files from the mounted volume
    root /usr/share/nginx/html;
    index index.html;

    # Angular routing fallback
    try_files $uri /index.html;
}