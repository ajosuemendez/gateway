# API Routes - Proxy to backend service
location /api/ {
    # Upload size limit - 500MB for video uploads
    client_max_body_size 500m;

    # Proxy timeouts for long uploads
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;
    proxy_connect_timeout 300s;

    # Proxy headers MUST be before proxy_pass
    proxy_set_header Host $proxy_host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $server_name;
    
    # Pass to backend - WITHOUT trailing / to preserve path structure
    proxy_pass http://host.docker.internal:5000;
    
    # Enable request body for POST requests
    proxy_request_buffering off;
    
    # Enable HTTP/1.1 chunked transfer for uploads
    proxy_http_version 1.1;
    chunked_transfer_encoding on;
    
    # CORS headers
    add_header 'Access-Control-Allow-Origin' $cors_origin always;
    add_header 'Access-Control-Allow-Credentials' 'true' always;
    add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, PATCH, OPTIONS' always;
    add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, X-API-KEY' always;
    
    # Handle CORS preflight requests
    if ($request_method = 'OPTIONS') {
        add_header 'Content-Length' 0;
        add_header 'Content-Type' text/plain;
        return 204;
    }
}

# Admin area - requires separate admin credentials
location /admin {
    auth_basic "Admin Area";
    auth_basic_user_file /etc/nginx/.htpasswd-admin;

    # Serve static Angular files
    root /usr/share/nginx/html;
    try_files $uri $uri/ /index.html;
}

# Allow internal index.html fallback without re-checking auth
location = /index.html {
    internal;
    auth_basic off;
    root /usr/share/nginx/html;
}

# Static files and Angular routing
location / {
    # Serve static Angular files from the mounted volume
    root /usr/share/nginx/html;
    try_files $uri $uri/ /index.html;
}